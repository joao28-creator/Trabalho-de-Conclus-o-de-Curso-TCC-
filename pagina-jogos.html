    </header>

    <div>
        <script>
            imgs[
                "img/imagem_jogo-dourada.png",

            ];

            const links = [
                "qual-resultado.html",

        <a href="qual-resultado.html" id="pag">

        </a>

        <script>
            const imgs = [
                "img/imagem_jogo-dourada.png","img/imagem_jogo-dualidade.png","img/imagem_jogo-prata.png"
            ];

            const pags = [
                "qual-resultado.html","qual-resultado.html","qual-resultado.html"
            ];

            let i = 0;

            function mudar_jogo(){
                i = (i + 1) % imgs.length;

                 document.getElementById("jogo").src = imgs[i];
                 document.getElementById("pag").href = pags[i]
            }
        </script>

        <button onclick="mudar_jogo()" class="botão">
